<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Spark - Home</title>
    <style>
        /* Core Layout Styling */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #dbe4f9; /* Soft pastel blue background */
            color: #2d3748;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Bright, Festive Header Banner */
        .spark-hero {
            width: 100%;
            background: linear-gradient(rgba(255, 255, 255, 0.65), rgba(255, 255, 255, 0.55)), 
                        url('english-spark-banner.jpg');
            background-size: cover;
            background-position: center;
            text-align: center;
            padding: 100px 20px;
            border-bottom: 2px dashed #b0c4de;
        }

        .spark-hero h1 {
            font-size: 4.5rem;
            font-weight: 900;
            color: #0f4c81; /* Deep rich blue title */
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .spark-hero p {
            font-size: 2.2rem;
            font-weight: 700;
            color: #2e5a1c; /* Fun grass green font for the tagline */
            max-width: 800px;
            margin: 0 auto;
        }

        /* Navigation Menu Box */
        .nav-container {
            max-width: 900px;
            width: 100%;
            padding: 60px 20px;
            display: flex;
            justify-content: center;
        }

        /* Simple Row setup for side-by-side items */
        .nav-row {
            display: flex;
            justify-content: center;
            gap: 30px;
            width: 100%;
            flex-wrap: wrap;
        }

        /* Professional Buttons Linked with Theme Palette */
        .spark-btn {
            display: inline-block;
            text-decoration: none;
            background-color: #0f4c81; /* Uses the deep rich title blue instead of black */
            color: #f7fafc;
            text-align: center;
            padding: 18px 40px;
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-radius: 6px;
            box-shadow: 0 4px 10px rgba(15, 76, 129, 0.2);
            min-width: 300px;
            border: 2px solid transparent;
            transition: all 0.3s ease-in-out;
        }

        /* Interactive and Clean Hover Inversion */
        .spark-btn:hover {
            background-color: #ffffff;
            color: #0f4c81;
            border: 2px solid #0f4c81;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(15, 76, 129, 0.3);
        }

        @media (max-width: 768px) {
            .spark-hero h1 { font-size: 2.8rem; }
            .spark-hero p { font-size: 1.5rem; }
            .spark-btn { width: 100%; min-width: 100%; }
            .nav-container { padding: 40px 20px; }
        }
    </style>
</head>
<body>

    <!-- HERO BANNER -->
    <header class="spark-hero">
        <h1>English Spark</h1>
        <!-- Updated Title-Case Capitalization -->
        <p>Your Daily Dose of English Fun!</p>
    </header>

    <!-- NAVIGATION MENU LINKS -->
    <main class="nav-container">
        
        <!-- Two Side-by-Side Main Buttons -->
        <div class="nav-row">
            <a href="introduction.html" class="spark-btn">About & Philosophy</a>
            <a href="school.html" class="spark-btn">My School</a>
        </div>

    </main>

</body>
</html>
