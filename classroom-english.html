<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Spark - Classroom English</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f0f4ff 0%, #dbe4f9 100%); 
            color: #2d3748;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .page-header {
            width: 100%;
            background: linear-gradient(rgba(92, 60, 133, 0.85), rgba(92, 60, 133, 0.7));
            text-align: center;
            padding: 60px 20px;
            border-bottom: 4px solid #8e70b8;
        }

        .page-header h1 {
            font-size: 3rem;
            color: #ffffff;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            margin-bottom: 10px;
        }

        .page-header p {
            font-size: 1.5rem;
            color: #ffe4e6;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
        }

        .main-content {
            max-width: 900px;
            width: 100%;
            padding: 40px 20px;
        }

        .back-nav {
            margin-bottom: 30px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            color: #5c3c85;
            font-weight: 700;
            transition: transform 0.2s;
        }

        .back-btn:hover {
            transform: translateX(-3px);
        }

        /* Table Styling */
        .table-container {
            background: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.02);
            border: 1px solid #e2e8f0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: #5c3c85;
            color: #ffffff;
            font-size: 1.1rem;
            padding: 18px;
            font-weight: 700;
        }

        td {
            padding: 16px;
            border-bottom: 1px solid #edf2f7;
            font-size: 1.05rem;
        }

        tr:last-child td {
            border-bottom: none;
        }

        /* Alternating row colors for easy tracking */
        tr:nth-child(even) {
            background-color: #fcfaff;
        }

        .english-cmd {
            font-weight: 700;
            color: #0f4c81;
        }

        @media (max-width: 600px) {
            .page-header h1 { font-size: 2.2rem; }
            th, td { padding: 12px; font-size: 0.95rem; }
        }
    </style>
</head>
<body>

    <header class="page-header">
        <h1>Classroom English</h1>
        <p>Useful phrases and commands for daily school life! 📣</p>
    </header>

    <main class="main-content">
        
        <div class="back-nav">
            <a href="index.html" class="back-btn">⬅️ Back to Home</a>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>English Phrase</th>
                        <th>Meaning (中文)</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="english-cmd">"Please look at me."</td>
                        <td>請看著我。</td>
                    </tr>
                    <tr>
                        <td class="english-cmd">"Listen carefully."</td>
                        <td>仔細聽。</td>
                    </tr>
                    <tr>
                        <td class="english-cmd">"Please raise your hand."</td>
                        <td>請舉手。</td>
                    </tr>
                    <tr>
                        <td class="english-cmd">"Open your book to page..."</td>
                        <td>請打開書翻到第...頁。</td>
                    </tr>
                    <tr>
                        <td class="english-cmd">"Put your hands down."</td>
                        <td>手放下來。</td>
                    </tr>
                    <tr>
                        <td class="english-cmd">"Line up, please."</td>
                        <td>請排隊。</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </main>

</body>
</html>
