<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Spark - Weekly Sentence</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f0f4ff 0%, #dbe4f9 100%); 
            color: #2d3748;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Purple theme for Bilingual Initiatives */
        .page-header {
            width: 100%;
            background: linear-gradient(rgba(92, 60, 133, 0.85), rgba(92, 60, 133, 0.7));
            text-align: center;
            padding: 60px 20px;
            border-bottom: 4px solid #8e70b8;
        }

        .page-header h1 {
            font-size: 3rem;
            color: #ffffff;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            margin-bottom: 10px;
        }

        .page-header p {
            font-size: 1.5rem;
            color: #fde68a;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
        }

        .main-content {
            max-width: 800px;
            width: 100%;
            padding: 40px 20px;
        }

        .back-nav {
            margin-bottom: 30px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            color: #5c3c85;
            font-weight: 700;
            transition: transform 0.2s;
        }

        .back-btn:hover {
            transform: translateX(-3px);
        }

        /* Large feature display for the current sentence */
        .sentence-display-box {
            background: #ffffff;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(92, 60, 133, 0.05);
            border: 2px solid #e9d5ff;
            margin-bottom: 40px;
        }

        .sentence-tag {
            background-color: #f3e8ff;
            color: #5c3c85;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 20px;
        }

        .english-sentence {
            font-size: 2.5rem;
            color: #2d3748;
            font-weight: 800;
            margin-bottom: 15px;
            line-height: 1.3;
        }

        .chinese-translation {
            font-size: 1.6rem;
            color: #6b7280;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .page-header h1 { font-size: 2.2rem; }
            .english-sentence { font-size: 1.8rem; }
            .chinese-translation { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <header class="page-header">
        <h1>Weekly English Sentence</h1>
        <p>One structural phrase at a time! 💬</p>
    </header>

    <main class="main-content">
        
        <div class="back-nav">
            <a href="index.html" class="back-btn">⬅️ Back to Home</a>
        </div>

        <!-- Simply edit the text below every week to update your target target phrase -->
        <section class="sentence-display-box">
            <span class="sentence-tag">This Week's Target</span>
            <h2 class="english-sentence">"Good morning! How are you doing today?"</h2>
            <p class="chinese-translation">早安！你今天過得怎麼樣？</p>
        </section>

    </main>

</body>
</html>
