<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Spark - Class Gallery</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f0f4ff 0%, #dbe4f9 100%); 
            color: #2d3748;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Consistent Header styling */
        .gallery-header {
            width: 100%;
            background: linear-gradient(rgba(15, 76, 129, 0.8), rgba(15, 76, 129, 0.65));
            text-align: center;
            padding: 60px 20px;
            border-bottom: 4px solid #2e5a1c;
        }

        .gallery-header h1 {
            font-size: 3rem;
            color: #ffffff;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            margin-bottom: 10px;
        }

        .gallery-header p {
            font-size: 1.5rem;
            color: #a3e635;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
        }

        .main-content {
            max-width: 1050px;
            width: 100%;
            padding: 40px 20px;
        }

        /* Back Button Link */
        .back-nav {
            margin-bottom: 30px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            color: #0f4c81;
            font-weight: 700;
            transition: transform 0.2s;
        }

        .back-btn:hover {
            transform: translateX(-3px);
        }

        /* Media Grid Layout */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .media-box {
            background: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
        }

        /* Styling for photos and videos to fit properly */
        .media-box img, .media-box video {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }

        .media-caption {
            padding: 15px;
            text-align: center;
            font-weight: 600;
            color: #4a5568;
            background: #ffffff;
            border-top: 1px solid #edf2f7;
        }

        @media (max-width: 768px) {
            .gallery-header h1 { font-size: 2.2rem; }
            .gallery-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header class="gallery-header">
        <h1>Our Class Gallery</h1>
        <p>Capturing our favorite English learning moments! 📸</p>
    </header>

    <main class="main-content">
        
        <!-- Back Button pointing back to your main page -->
        <div class="back-nav">
            <a href="index.html" class="back-btn">⬅️ Back to Home</a>
        </div>

        <section class="gallery-grid">

            <!-- Example Photo Box -->
            <div class="media-box">
                <img src="photo1.jpg" alt="Class Activity">
                <div class="media-caption">Group Game Day 🎲</div>
            </div>

            <!-- Example Video Box -->
            <div class="media-box">
                <video controls>
                    <source src="video1.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                <div class="media-caption">English Speaking Practice 💬</div>
            </div>

            <!-- Example Photo Box 2 -->
            <div class="media-box">
                <img src="photo2.jpg" alt="Class Project">
                <div class="media-caption">Our Creative Poster Showcase ✨</div>
            </div>

        </section>
    </main>

</body>
</html>
