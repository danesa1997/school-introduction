<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>About & Philosophy - English Sparks</title>
    <style>
        /* Professional Lavender Core Styling & Color Palette */
        :root {
            --bg-lavender: #f4f0fa; /* Very light, soft pastel lavender background */
            --title-amethyst: #5c3c85; /* Beautiful, clear amethyst purple for primary titles */
            --accent-lavender: #8e70b8; /* Classic lavender tint for highlights and subheadings */
            --card-white: #ffffff;
            --text-dark: #312a3a; /* Dark charcoal with a subtle lavender undertone */
            --text-light: #6e647c;
            --border-soft: #eadef7; /* Very delicate lavender border line */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-lavender);
            color: var(--text-dark);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Profile Header Banner - Styled cleanly to highlight the catchy text */
        .intro-hero {
            width: 100%;
            background-color: transparent;
            text-align: center;
            padding: 80px 20px 60px 20px;
            border-bottom: 2px dashed var(--border-soft);
        }

        .intro-hero h1 {
            font-size: 4rem; 
            font-weight: 900; 
            color: var(--title-amethyst); 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            margin-bottom: 15px;
            text-shadow: 2px 2px 5px rgba(92, 60, 133, 0.12);
        }

        .intro-hero p {
            font-size: 1.4rem; 
            font-weight: 700; 
            letter-spacing: 0.5px; 
            color: var(--accent-lavender);
            background: rgba(255, 255, 255, 0.6);
            display: inline-block;
            padding: 6px 20px;
            border-radius: 25px;
            box-shadow: 0 4px 10px rgba(142, 112, 184, 0.04);
        }

        /* Main Content Layout Container */
        .container {
            max-width: 900px;
            width: 100%;
            padding: 40px 20px;
        }

        /* Back to Home Link */
        .back-home {
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            color: var(--title-amethyst);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            margin-bottom: 30px;
            transition: color 0.2s ease;
        }

        .back-home:hover {
            color: var(--accent-lavender);
            text-decoration: underline;
        }

        /* Content Blocks Shared Styling */
        .content-block {
            background-color: var(--card-white);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 4px 15px rgba(142, 112, 184, 0.05);
            margin-bottom: 35px;
            border: 1px solid rgba(234, 222, 247, 0.6);
        }

        /* Profile Layout Box Specifics */
        .profile-section {
            display: flex;
            gap: 35px;
            align-items: center;
            flex-wrap: wrap;
        }

        /* Oval Profile Picture Setup with Continuous Crossfading Transitions */
        .profile-img-box {
            flex: 0 0 220px;
            height: 220px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            background-color: #f3effa;
            border: 4px solid var(--border-soft);
            box-shadow: 0 4px 10px rgba(142, 112, 184, 0.12);
            transition: opacity 0.5s ease-in-out; /* Smooth transition when changing pics */
            opacity: 1;
        }

            flex: 1;
            min-width: 280px;
