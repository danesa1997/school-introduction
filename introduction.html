<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Spark - Home</title>
    <style>
        /* Professional Lavender Core Styling & Color Palette */
        :root {
            --bg-lavender: #f4f0fa; /* Very light, soft pastel lavender background */
            --title-amethyst: #5c3c85; /* Beautiful, clear amethyst purple for primary titles */
            --accent-lavender: #8e70b8; /* Classic lavender tint for highlights and subheadings */
            --card-white: #ffffff;
            --text-dark: #2d2736;
            --border-soft: #eadef7; /* Very delicate lavender border line */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-lavender);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        /* Main Hero Presentation Container */
        .hero-container {
            width: 100%;
            max-width: 800px;
            text-align: center;
            padding: 60px 20px;
        }

        /* Refined Header Typography */
        .hero-container h1 {
            font-size: 4rem; 
            font-weight: 900; 
            color: var(--title-amethyst); 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            margin-bottom: 15px;
            text-shadow: 2px 2px 5px rgba(92, 60, 133, 0.12);
        }

        /* Catchy Subtitle Design with White Pill Bubble Background */
        .hero-container p {
            font-size: 1.4rem; 
            font-weight: 700; 
            letter-spacing: 0.5px; 
            color: var(--accent-lavender);
            background: rgba(255, 255, 255, 0.6);
            display: inline-block;
            padding: 6px 20px;
            border-radius: 25px;
            box-shadow: 0 4px 10px rgba(142, 112, 184, 0.04);
            margin-bottom: 50px;
        }

        /* Divider Decoration */
        .divider {
            width: 100%;
            border-bottom: 2px dashed var(--border-soft);
            margin-bottom: 50px;
        }

        /* Dynamic Grid Layout for Navigation Links */
        .button-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            width: 100%;
        }

        /* Reimagined Premium Button Design */
        .nav-btn {
            display: inline-block;
            text-decoration: none;
            padding: 16px 35px;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--title-amethyst);
            background-color: var(--card-white);
            border: 2px solid var(--border-soft);
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(142, 112, 184, 0.06);
            transition: all 0.25s ease;
            min-width: 240px;
            cursor: pointer;
        }

        /* Smooth Interactive Hover Effects */
        .nav-btn:hover {
            color: var(--card-white);
            background-color: var(--title-amethyst);
            border-color: var(--title-amethyst);
            transform: translateY(-3px); /* Subtle elevate animation */
            box-shadow: 0 8px 20px rgba(92, 60, 133, 0.18);
        }

        /* Responsive Layout fixes for mobile displays */
        @media (max-width: 600px) {
            .hero-container h1 { font-size: 2.8rem; letter-spacing: 2px; }
            .hero-container p { font-size: 1.1rem; padding: 4px 16px; margin-bottom: 40px; }
            .divider { margin-bottom: 40px; }
            .nav-btn { width: 100%; max-width: 280px; }
        }
    </style>
</head>
<body>

    <main class="hero-container">
        <!-- Title Branding Headers -->
        <h1>English Spark</h1>
        <p>Your Daily Dose of English Fun!</p>

        <!-- Centered Aesthetic Separator -->
        <div class="divider"></div>

        <!-- Links Core Navigation Layout -->
        <div class="button-group">
            <a href="introduction.html" class="nav-btn">About & Philosophy</a>
            <a href="#" class="nav-btn">My School</a>
        </div>
    </main>

</body>
</html>
